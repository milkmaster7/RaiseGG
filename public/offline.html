<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline — RaiseGG</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #0b0c1d;
      background-image:
        radial-gradient(ellipse 80% 50% at 20% 0%, rgba(0,230,255,0.06) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 100%, rgba(255,200,0,0.04) 0%, transparent 60%);
      color: #e0e6ef;
      font-family: system-ui, -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    .container {
      text-align: center;
      padding: 2rem;
      max-width: 420px;
    }
    .logo {
      font-size: 2.5rem;
      font-weight: 900;
      letter-spacing: 0.04em;
      background: linear-gradient(135deg, #00e6ff, #7b61ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 1.5rem;
    }
    .icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 1.5rem;
      border-radius: 16px;
      background: rgba(0,230,255,0.08);
      border: 1px solid rgba(0,230,255,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .icon svg {
      width: 32px;
      height: 32px;
      stroke: #00e6ff;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    h1 {
      font-size: 1.25rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
      color: #fff;
    }
    p {
      color: #a0a6b2;
      font-size: 0.9rem;
      line-height: 1.6;
      margin-bottom: 1.5rem;
    }
    .btn {
      display: inline-block;
      background: #00e6ff;
      color: #0b0c1d;
      font-weight: 700;
      font-size: 0.875rem;
      padding: 0.75rem 1.5rem;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      text-decoration: none;
      transition: box-shadow 0.2s;
    }
    .btn:hover {
      box-shadow: 0 0 20px rgba(0,230,255,0.4);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">RaiseGG</div>
    <div class="icon">
      <svg viewBox="0 0 24 24">
        <path d="M1 1h22v22H1z" fill="none" stroke="none"/>
        <path d="M18.36 6.64a9 9 0 1 1-12.73 0"/>
        <line x1="12" y1="2" x2="12" y2="12"/>
      </svg>
    </div>
    <h1>You are offline</h1>
    <p>It looks like you have lost your internet connection. Check your network and try again.</p>
    <button class="btn" onclick="window.location.reload()">Try Again</button>
  </div>
</body>
</html>
